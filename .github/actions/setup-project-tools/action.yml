name: setup project tools
description: Install host packages and mise-managed project tools.

runs:
  using: composite
  steps:
  # Keep this OS package list intentionally tiny. Every package here is outside
  # mise and makes the CI runner image part of the build contract, so prefer
  # project manifests, .mise/config.toml, or tool-managed installs whenever
  # possible. Only add packages that are true header/linker/runtime requirements
  # for current CI jobs and cannot reasonably be provisioned by project tools.
  - name: install Linux system dependencies
    if: runner.os == 'Linux'
    shell: bash
    run: |
      sudo apt-get update
      sudo apt-get install -y libssl-dev
  # mise installs Rust through rustup, but rustup stores toolchains and
  # components outside mise's install metadata by default. Keep rustup's state
  # under mise's OS-specific data dir here so jdx/mise-action's cache restores
  # the clippy/rustfmt/target components that the project tool config requests.
  # The Rust backend also shares a cached rustup-init binary across all Rust
  # entries, so install serially to avoid concurrent first-run permission races.
  - name: configure mise-managed rustup cache
    shell: bash
    run: |
      if [[ "$RUNNER_OS" == "Windows" ]]; then
        rustup_home="${LOCALAPPDATA}\\mise\\rustup"
      else
        rustup_home="${HOME}/.local/share/mise/rustup"
      fi

      {
        echo "MISE_RUSTUP_HOME=$rustup_home"
        echo "RUSTUP_HOME=$rustup_home"
        echo "MISE_JOBS=1"
      } >> "$GITHUB_ENV"
  - uses: jdx/mise-action@v4
    with:
      cache_key_prefix: mise-v3
